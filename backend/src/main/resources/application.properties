# Web3 & Blockchain Variables
blockchain.contract.address=0xfd7a62abe2e55bc7a8cdd8cca5115e81fa4e4f39
blockchain.wallet.private-key=${BLOCKCHAIN_PRIVATE_KEY:your_testnet_private_key_here}

# PostgreSQL Database Configuration
spring.jpa.hibernate.ddl-auto=update
# Use separate variables for reliability on Render
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medichain}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:pass123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:your_jwt_secret_base64_string_here}
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}
gemini.model.name=${GEMINI_MODEL:gemma-3-27b-it}
